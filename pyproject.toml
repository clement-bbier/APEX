[build-system]
requires = ["setuptools>=75.0", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E","W","F","I","N","UP","ANN","S","B","A","C4","PT","RUF"]
ignore = ["ANN101","ANN102","S101"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN","S"]

[tool.mypy]
python_version = "3.11"
strict = true

[[tool.mypy.overrides]]
module = [
    "pandas_ta.*",
    "binance.*",
    "yfinance.*",
    "fredapi.*",
    "apex_mc.*",
    "apex_risk.*",
    "websockets.*",
    "uvicorn.*",
    "fakeredis.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = [
    "--cov=.",
    "--cov-report=term-missing",
    "--cov-fail-under=85",
    "--timeout=30",
    "-v",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:pandas_ta",
    "ignore::DeprecationWarning:binance",
    "ignore::DeprecationWarning:pydantic",
]

[tool.coverage.run]
omit = [
    "tests/*",
    "scripts/*",
    "docker/*",
    "rust/*",
    "**/__init__.py",
]
branch = true

[tool.bandit]
exclude_dirs = ["tests", "scripts"]
skips = ["B101"]
