# Dependency additions for the benchmarks/ tree and for the connectors/
# tree. Paste the relevant sections into the project's root pyproject.toml.
#
# These additions are additive -- nothing existing needs to change.

[project.optional-dependencies]
# Pick per-broker extras, or install all via
#   pip install -e ".[connectors-alpaca,connectors-ibkr,connectors-polygon]"
connectors-alpaca = ["alpaca-py>=0.30.0"]
connectors-ibkr = ["ib_insync>=0.9.86"]
connectors-polygon = ["polygon-api-client>=1.14.0"]

[dependency-groups]
# pytest-benchmark is a dev-only dependency; CI doesn't need it unless
# a dedicated benchmarks job is added. Install locally via:
#   pip install pytest-benchmark
# or (when the group is active) pip install --group dev
dev = [
    "pytest-benchmark>=5.0.0",
]
