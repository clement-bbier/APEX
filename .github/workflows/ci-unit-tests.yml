# APEX CI — Rust wheels + unit tests + coverage gate
#
# Two-job workflow:
#
#   1. rust-build (name: rust)
#      Builds/tests the two PyO3 crates (apex_mc, apex_risk) and publishes
#      the release wheels as a `rust-wheels` artifact scoped to THIS
#      workflow run. Must succeed before unit-tests starts.
#
#   2. unit-tests (name: unit-tests)
#      Downloads the `rust-wheels` artifact produced by rust-build (same
#      workflow run — this is the canonical pattern; cross-workflow
#      artifact download without explicit run-id does NOT work), installs
#      the wheels, and runs pytest tests/unit/ against an ephemeral Redis
#      service container.
#
# This merged structure replaces the former ci-rust.yml + ci-unit-tests.yml
# split, which was broken: actions/download-artifact@v4 cannot fetch an
# artifact produced by a different workflow run. See issue #242 for the
# failure mode and CICD_RESET_AUDIT_2026-04-21.md §6 for the decision
# record.
#
# Coverage gate: currently --cov-fail-under=75 (mirrors pyproject.toml
# [tool.pytest.ini_options] default). Target is 85% per CLAUDE.md §6 —
# see CICD_RESET_AUDIT_2026-04-21.md §3 for the ramp plan and
# [phase-A.13] tracker (issue #203).
#
# Required statuses: `rust`, `unit-tests`.

name: unit-tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  PYTHONPATH: ${{ github.workspace }}
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

concurrency:
  group: ci-unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-build:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry, index, target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: cargo check (workspace)
        working-directory: rust
        run: cargo check --workspace --locked

      - name: cargo test (workspace)
        working-directory: rust
        run: cargo test --workspace --locked

      - name: cargo clippy (workspace)
        working-directory: rust
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
        continue-on-error: true

      - name: Build PyO3 wheels (maturin release)
        run: |
          python -m pip install --upgrade pip
          pip install "maturin>=1.9.4"
          (cd rust/apex_mc && maturin build --release)
          (cd rust/apex_risk && maturin build --release)

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheels
          path: rust/target/wheels/*.whl
          retention-days: 1
          if-no-files-found: error

  unit-tests:
    name: unit-tests
    needs: rust-build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Download Rust wheels (from rust-build job)
        uses: actions/download-artifact@v4
        with:
          name: rust-wheels
          path: ./wheels

      - name: Install dependencies (incl. local Rust wheels)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-asyncio fakeredis
          pip install ./wheels/*.whl

      - name: Unit tests with coverage gate
        env:
          REDIS_URL: "redis://localhost:6379/0"
          APEX_REDIS_TTL_SECONDS: "60"
        run: |
          pytest tests/unit/ -v \
            --cov=services --cov=core --cov=backtesting \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=75 --timeout=30

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
