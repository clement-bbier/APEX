# APEX CI — Backtest regression gate
#
# Runs the scripts/backtest_regression.py gate against the 30-day
# BTCUSDT fixture. Un-muzzled per issue #196 (phase-A.6) following the
# PBO fix in PR #272 (Sprint 5 Wave A) and the Sharpe calculation
# correction under phase-A.5. The job now reports its real pass/fail
# status.
#
# Thresholds (BACKTEST_MIN_SHARPE / BACKTEST_MAX_DD) reflect the current
# 30-day BTCUSDT fixture quality. Tightening to CLAUDE.md §6 targets
# (MIN_SHARPE=0.8, MAX_DD=0.08) is tracked separately as an alpha-policy
# decision tied to Strategy #1 Gate 2.

name: backtest-gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHONPATH: ${{ github.workspace }}
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ci-backtest-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backtest-gate:
    name: backtest-gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate fixture
        run: python scripts/generate_test_fixtures.py

      - name: Backtest regression gate
        env:
          # Thresholds reflect current 30-day BTCUSDT fixture quality.
          # Tightening to CLAUDE.md §6 targets (MIN_SHARPE=0.8, MAX_DD=0.08)
          # is a separate alpha-policy decision tied to Strategy #1 Gate 2.
          BACKTEST_MIN_SHARPE: "0.5"
          BACKTEST_MAX_DD: "0.12"
        run: |
          python scripts/backtest_regression.py \
            --fixture tests/fixtures/30d_btcusdt_1m.parquet