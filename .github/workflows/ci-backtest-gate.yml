# APEX CI — Backtest regression gate (MUZZLED)
#
# Runs the scripts/backtest_regression.py gate against the 30-day
# BTCUSDT fixture. Intentionally non-blocking (`continue-on-error: true`)
# until un-muzzling per issue #196 (phase-A.6) — which requires phase-A.5
# to land and the Sharpe calculation in `full_report()` to be fixed.
#
# HARD CONSTRAINT (per mission brief 2026-04-21 / issue #196):
#   Do NOT remove `continue-on-error: true`. Do NOT restore the
#   CLAUDE.md §6 target thresholds (MIN_SHARPE=0.8, MAX_DD=0.08) on this
#   workflow. Un-muzzling is scheduled after 2026-04-27 or Strategy #1
#   Gate 2, whichever first.
#
# When un-muzzling (separate PR, tracked by #196):
#   1. Remove `continue-on-error: true` below.
#   2. Restore BACKTEST_MIN_SHARPE=0.8, BACKTEST_MAX_DD=0.08.
#   3. Delete the "Announce muzzled-gate status" step.
#   4. Add `backtest-gate` to required status checks on branch protection.
#
# Not required on branch protection today. Intentionally.

name: backtest-gate (MUZZLED — see #196)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHONPATH: ${{ github.workspace }}
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ci-backtest-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backtest-gate:
    name: "backtest-gate (MUZZLED — see #196)"
    runs-on: ubuntu-latest
    # Non-blocking pending phase-A.6 (#196). Do NOT remove without the
    # prerequisites listed in the header.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Announce muzzled-gate status
        run: |
          echo "::warning title=Backtest gate muzzled::backtest-gate runs with continue-on-error=true pending #196 / phase-A.6. Failures here do NOT block merges."

      - name: Generate fixture
        run: python scripts/generate_test_fixtures.py

      - name: Backtest regression gate
        env:
          # MUZZLED thresholds — reflect fixture quality, NOT CLAUDE.md §6
          # targets. Restore MIN_SHARPE=0.8, MAX_DD=0.08 when un-muzzling
          # per #196.
          BACKTEST_MIN_SHARPE: "0.5"
          BACKTEST_MAX_DD: "0.12"
        run: |
          python scripts/backtest_regression.py \
            --fixture tests/fixtures/30d_btcusdt_1m.parquet
