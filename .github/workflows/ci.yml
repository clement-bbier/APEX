name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHONPATH: ${{ github.workspace }}
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt bandit
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy . --strict
      - run: bandit -r core supervisor services backtesting -c pyproject.toml

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - working-directory: rust
        run: cargo test --workspace
      - name: Build Rust wheels
        run: |
          python -m pip install "maturin>=1.9.4"
          (cd rust/apex_mc && maturin build --release)
          (cd rust/apex_risk && maturin build --release)
      - uses: actions/upload-artifact@v4
        with:
          name: rust-wheels
          path: rust/target/wheels/*.whl
          retention-days: 1

  unit-tests:
    needs: [quality, rust]
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/download-artifact@v4
        with:
          name: rust-wheels
          path: ./wheels
      - name: Install deps
        run: |
          pip install -r requirements.txt pytest-asyncio fakeredis
          pip install ./wheels/*.whl
      - name: Unit tests with coverage gate
        env:
          REDIS_URL: "redis://localhost:6379/0"
          APEX_REDIS_TTL_SECONDS: "60"
        run: |
          pytest tests/unit/ -v \
            --cov=services --cov=core --cov=backtesting \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=40 --timeout=30
      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest-asyncio fakeredis
      - run: docker compose -f docker/docker-compose.test.yml up -d --wait
      - name: Integration tests (no coverage gate)
        run: pytest tests/integration/ -v --timeout=60 -p no:cacheprovider
      - if: always()
        run: docker compose -f docker/docker-compose.test.yml down -v

  backtest-gate:
    needs: [unit-tests]
    runs-on: ubuntu-latest
    continue-on-error: true  # TODO(APEX-METRICS-V2): re-enable as blocking once full_report() Sharpe bug is fixed
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate fixture
        run: python scripts/generate_test_fixtures.py
      - name: Backtest regression gate
        env:
          BACKTEST_MIN_SHARPE: "0.5"
          BACKTEST_MAX_DD: "0.12"
        run: |
          python scripts/backtest_regression.py \
            --fixture tests/fixtures/30d_btcusdt_1m.parquet
