name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # Lowercase the image name so it's a legal OCI reference even when
      # the repository owner contains uppercase letters.
      - name: Compute image reference
        id: img
        run: |
          owner_repo="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${owner_repo}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.service
          push: true
          provenance: false
          tags: |
            ${{ steps.img.outputs.image }}:${{ github.sha }}
            ${{ steps.img.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
