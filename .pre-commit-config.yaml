# Pre-commit hooks for APEX
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Standard hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  # Forbid committing .env files (allow .env.example)
  - repo: local
    hooks:
      - id: forbid-env-files
        name: Forbid committing .env files
        entry: 'Committing .env files is forbidden (use .env.example instead)'
        language: fail
        files: '^\.env(\..+)?$'
        exclude: '^\.env\.example$'

  # Ruff (linter + formatter)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        # CI-aligned: check only (no --fix). Run 'ruff check --fix' manually.
      - id: ruff-format
        args: [--check]

  # Mypy (type checker)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0
          - types-PyYAML
          - types-croniter
        args: [--strict]
        exclude: ^(tests/|services/command_center/dashboard\.py)

  # Bandit (security)
  - repo: https://github.com/PyCQA/bandit
    rev: '1.8.3'
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -ll]
        exclude: ^tests/

  # Gitleaks (secret detection)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
