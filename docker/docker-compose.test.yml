# docker-compose.test.yml — lightweight stack for integration tests
name: apex-test

services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    # NOTE: pinned to match docker-compose.yml; consider pinning to a specific
    # TimescaleDB version (e.g., 2.17.2-pg16) for deterministic CI
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: apex_test
      POSTGRES_USER: apex_test
      POSTGRES_PASSWORD: apex_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex_test"]
      interval: 5s
      timeout: 3s
      retries: 5
